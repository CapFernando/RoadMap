<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planejamento — RoadMap de Melhorias</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0E0E0D;
      --bg2:     #161614;
      --bg3:     #1E1E1C;
      --bg4:     #252522;
      --border:  #2E2E2B;
      --border2: #3A3A36;
      --text:    #ECEAE2;
      --text2:   #A8A49A;
      --text3:   #6E6A62;
      --blue:    #3B8FE8;
      --amber:   #E89C2F;
      --green:   #5EA832;
      --red:     #E84444;
      --purple:  #9B6FE8;
      --teal:    #2BBFA0;
      --radius:  10px;
      --day-w:   52px;
      --dev-label: 200px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── LOGIN ── */
    #login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
    }
    .login-box {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 16px; padding: 40px 36px;
      width: 100%; max-width: 380px; text-align: center;
    }
    .login-box h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .login-box p  { font-size: 14px; color: var(--text2); margin-bottom: 28px; }
    .login-box input {
      width: 100%; padding: 12px 14px;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text);
      font-size: 16px; font-family: 'Inter', sans-serif;
      outline: none; margin-bottom: 14px; letter-spacing: 2px;
    }
    .login-box input:focus { border-color: var(--blue); }
    .login-box button {
      width: 100%; padding: 13px; background: var(--blue); color: #fff;
      font-size: 16px; font-weight: 600; font-family: 'Inter', sans-serif;
      border: none; border-radius: var(--radius); cursor: pointer;
    }
    .login-box button:hover { opacity: 0.9; }
    .login-error { color: var(--red); font-size: 14px; margin-top: 10px; min-height: 20px; }

    /* ── APP ── */
    #gantt-app { display: none; }

    header {
      background: var(--bg2); border-bottom: 1px solid var(--border);
      padding: 12px 20px; display: flex; align-items: center;
      justify-content: space-between; flex-wrap: wrap; gap: 10px;
      position: sticky; top: 0; z-index: 50;
    }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .header-left h1 { font-size: 17px; font-weight: 600; white-space: nowrap; }
    .month-nav { display: flex; align-items: center; gap: 6px; }
    .month-nav span { font-size: 15px; font-weight: 600; min-width: 160px; text-align: center; }
    .header-right { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

    .btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 8px 14px; border-radius: var(--radius);
      font-size: 13px; font-weight: 500; font-family: 'Inter', sans-serif;
      cursor: pointer; border: none; transition: opacity 0.15s; white-space: nowrap;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary   { background: var(--blue);  color: #fff; }
    .btn-secondary { background: var(--bg3);   color: var(--text); border: 1px solid var(--border); }
    .btn-ghost     { background: transparent;  color: var(--text2); border: 1px solid var(--border); }
    .btn-nav       { background: var(--bg3);   color: var(--text); border: 1px solid var(--border); padding: 6px 10px; font-size: 15px; }
    .btn-sm { padding: 6px 11px; font-size: 12px; }

    /* ── INDICATORS ── */
    .indicator-bar {
      background: var(--bg2); border-bottom: 1px solid var(--border);
      padding: 8px 20px; display: flex; gap: 8px; flex-wrap: wrap;
    }
    .ind-chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
      border: 1px solid; cursor: pointer; transition: opacity 0.15s; user-select: none;
    }
    .ind-chip:hover { opacity: 0.8; }
    .ind-chip.backlog     { background:#252522; border-color:#3A3A36; color:#6E6A62; }
    .ind-chip.planejado   { background:#0C3260; border-color:#1a5080; color:#9BC8F8; }
    .ind-chip.em_andamento{ background:#5C3608; border-color:#8C5010; color:#F9C97A; }
    .ind-chip.concluido   { background:#1E4208; border-color:#306010; color:#B2E07A; }
    .ind-chip.atrasado    { background:#5C0A0A; border-color:#8C1010; color:#F9A0A0; }
    .ind-chip.active-filter { outline: 2px solid rgba(255,255,255,0.3); outline-offset: 1px; }

    /* ── FILTER BAR ── */
    .filter-bar {
      background: var(--bg2); border-bottom: 1px solid var(--border);
      padding: 8px 20px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
    }
    .filter-bar label { font-size: 12px; color: var(--text3); margin-right: 2px; }
    .filter-bar select, .filter-bar input[type="text"] {
      padding: 5px 10px; background: var(--bg3); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text); font-size: 12px;
      font-family: 'Inter', sans-serif; outline: none; min-width: 120px;
    }
    .filter-bar select:focus, .filter-bar input:focus { border-color: var(--blue); }
    .filter-bar select option { background: var(--bg3); }
    .filter-divider { width: 1px; height: 20px; background: var(--border); margin: 0 2px; }

    /* ── MAIN LAYOUT ── */
    .main-layout {
      display: flex; height: calc(100vh - 125px);
    }

    /* ── BACKLOG SIDEBAR ── */
    .backlog-sidebar {
      width: 220px; flex-shrink: 0; background: var(--bg2);
      border-right: 1px solid var(--border); display: flex; flex-direction: column;
      overflow: hidden;
    }
    .backlog-header {
      padding: 12px 14px; font-size: 13px; font-weight: 600;
      border-bottom: 1px solid var(--border); color: var(--text2);
      display: flex; justify-content: space-between; align-items: center;
    }
    .backlog-list {
      flex: 1; overflow-y: auto; padding: 8px;
    }
    .backlog-list::-webkit-scrollbar { width: 4px; }
    .backlog-list::-webkit-scrollbar-track { background: transparent; }
    .backlog-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

    .backlog-card {
      background: var(--bg3); border: 1px solid var(--border2);
      border-radius: 8px; padding: 8px 10px; margin-bottom: 6px;
      cursor: grab; user-select: none; transition: border-color 0.15s;
    }
    .backlog-card:hover { border-color: var(--blue); }
    .backlog-card:active { cursor: grabbing; }
    .backlog-card-title { font-size: 12px; font-weight: 500; color: var(--text); line-height: 1.4; margin-bottom: 4px; }
    .backlog-card-meta { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }

    /* ── GANTT AREA ── */
    .gantt-area {
      flex: 1; overflow: auto; position: relative;
    }
    .gantt-area::-webkit-scrollbar { width: 6px; height: 6px; }
    .gantt-area::-webkit-scrollbar-track { background: var(--bg); }
    .gantt-area::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

    .gantt-table {
      min-width: max-content; position: relative;
    }

    /* Day header row */
    .gantt-header-row {
      display: flex; position: sticky; top: 0; z-index: 20;
      background: var(--bg2); border-bottom: 1px solid var(--border);
    }
    .gantt-corner {
      width: var(--dev-label); flex-shrink: 0;
      border-right: 1px solid var(--border); padding: 8px 12px;
      font-size: 11px; font-weight: 600; color: var(--text3);
      display: flex; align-items: flex-end;
      position: sticky; left: 0; z-index: 30; background: var(--bg2);
    }
    .day-cell-header {
      width: var(--day-w); flex-shrink: 0; text-align: center;
      padding: 6px 2px; border-right: 1px solid var(--border);
      font-size: 11px; color: var(--text2);
    }
    .day-cell-header.weekend  { display: none; }
    .day-cell-header.holiday  { color: var(--text3); background: rgba(255,60,60,0.05); }
    .day-cell-header.today    { color: var(--blue); font-weight: 700; }
    .day-cell-header .day-num { font-size: 14px; font-weight: 600; display: block; }
    .day-cell-header .day-name{ font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }

    /* Dev rows */
    .dev-row {
      display: flex; border-bottom: 1px solid var(--border);
      min-height: 56px; position: relative;
    }
    .dev-label {
      width: var(--dev-label); flex-shrink: 0; padding: 8px 12px;
      border-right: 1px solid var(--border); display: flex; flex-direction: column;
      justify-content: center; gap: 4px; position: sticky; left: 0; z-index: 10;
      background: var(--bg2);
    }
    .dev-name { font-size: 13px; font-weight: 600; color: var(--text); }
    .cap-bar-wrap { display: flex; align-items: center; gap: 6px; }
    .cap-bar-track {
      flex: 1; height: 4px; background: var(--bg4); border-radius: 2px; overflow: hidden; max-width: 100px;
    }
    .cap-bar-fill {
      height: 100%; border-radius: 2px; background: var(--green); transition: width 0.3s;
    }
    .cap-bar-fill.over { background: var(--red); }
    .cap-text { font-size: 10px; color: var(--text3); white-space: nowrap; }

    /* Day cells in dev row */
    .dev-timeline {
      flex: 1; position: relative; display: flex;
    }
    .day-cell {
      width: var(--day-w); flex-shrink: 0; border-right: 1px solid var(--border);
      position: relative; cursor: pointer; transition: background 0.1s;
    }
    .day-cell:hover  { background: rgba(59,143,232,0.06); }
    .day-cell.weekend { display: none; }
    .day-cell.holiday { background: rgba(255,60,60,0.03); cursor: not-allowed; }
    .day-cell.holiday:hover { background: rgba(255,60,60,0.05); }
    .day-cell.drop-over { background: rgba(59,143,232,0.18) !important; }
    .day-cell.today-col { background: rgba(59,143,232,0.04); }

    /* Cards on gantt */
    .gantt-cards-layer {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none;
    }
    .gantt-card {
      position: absolute; border-radius: 6px; border: 1px solid;
      font-size: 11px; font-weight: 500; overflow: hidden;
      cursor: pointer; pointer-events: all; z-index: 5;
      display: flex; align-items: center; gap: 4px; padding: 0 6px;
      white-space: nowrap; user-select: none;
      transition: filter 0.15s, opacity 0.15s;
    }
    .gantt-card:hover { filter: brightness(1.2); z-index: 6; }
    .gantt-card.dragging { opacity: 0.4; }
    .gantt-card .card-label { overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
    .gantt-card .card-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

    /* status_planejamento colors */
    .gcard-backlog     { background:#252522; border-color:#3A3A36; color:#6E6A62; }
    .gcard-planejado   { background:#0C3260; border-color:#1a5080; color:#9BC8F8; }
    .gcard-em_andamento{ background:#5C3608; border-color:#8C5010; color:#F9C97A; }
    .gcard-concluido   { background:#1E4208; border-color:#306010; color:#B2E07A; }
    .gcard-atrasado    { background:#5C0A0A; border-color:#8C1010; color:#F9A0A0; }

    /* priority dot colors */
    .dot-alta   { background: var(--red); }
    .dot-media  { background: var(--amber); }
    .dot-baixa  { background: var(--text3); }

    /* tema badge */
    .tema-badge {
      font-size: 10px; font-weight: 600; padding: 1px 5px;
      border-radius: 4px; background: rgba(255,255,255,0.1);
      color: inherit; flex-shrink: 0; overflow: hidden;
      max-width: 70px; text-overflow: ellipsis; white-space: nowrap;
    }

    /* ── TOOLTIP ── */
    #tooltip {
      position: fixed; background: var(--bg3); border: 1px solid var(--border2);
      border-radius: 10px; padding: 12px 14px; max-width: 300px;
      font-size: 12px; z-index: 200; pointer-events: none; opacity: 0;
      transition: opacity 0.15s; line-height: 1.6;
    }
    #tooltip.show { opacity: 1; }
    #tooltip .tt-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    #tooltip .tt-row { color: var(--text2); display: flex; gap: 6px; }
    #tooltip .tt-row b { color: var(--text); }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.72);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; padding: 20px;
    }
    .modal {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 14px; width: 100%; max-width: 580px;
      max-height: 92vh; overflow-y: auto; padding: 28px;
    }
    .modal h2 { font-size: 19px; font-weight: 700; margin-bottom: 20px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 5px; }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%; padding: 10px 13px;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text);
      font-size: 14px; font-family: 'Inter', sans-serif;
      outline: none; resize: vertical;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { border-color: var(--blue); }
    .form-group select option { background: var(--bg3); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 500px) { .form-row { grid-template-columns: 1fr; } }
    .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; }
    .form-actions-left { display: flex; gap: 10px; justify-content: space-between; margin-top: 18px; }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 28px; right: 28px;
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--text); padding: 12px 18px; border-radius: var(--radius);
      font-size: 13px; font-weight: 500; z-index: 999;
      opacity: 0; transition: opacity 0.2s; pointer-events: none; max-width: 340px;
    }
    #toast.show { opacity: 1; }
    #toast.ok  { border-color: var(--green); color: var(--green); }
    #toast.err { border-color: var(--red);   color: var(--red); }

    .saving-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 300; font-size: 16px; color: var(--text2);
    }

    .empty-gantt {
      padding: 60px 20px; text-align: center; color: var(--text3); font-size: 14px;
    }
    .empty-gantt p { margin-bottom: 12px; }

    .delete-btn { background: var(--red); color: #fff; }
    .delete-btn:hover { opacity: 0.85; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h2>📅 Planejamento</h2>
    <p>RoadMap de Melhorias · Audax Capital</p>
    <input type="password" id="senha-input" placeholder="Senha de acesso" onkeydown="if(event.key==='Enter')doLogin()" />
    <div id="token-field" style="display:none">
      <input type="password" id="token-input" placeholder="GitHub Token (ghp_…)" onkeydown="if(event.key==='Enter')doLogin()" style="letter-spacing:0" />
      <p style="font-size:12px;color:var(--text3);text-align:left;margin:-8px 0 14px;line-height:1.5">Necessário apenas na primeira vez neste navegador.</p>
    </div>
    <button onclick="doLogin()">Entrar</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- APP -->
<div id="gantt-app">
  <header>
    <div class="header-left">
      <a href="admin.html" class="btn btn-ghost btn-sm">← Admin</a>
      <h1>📅 Planejamento</h1>
      <div class="month-nav">
        <button class="btn btn-nav" onclick="prevMonth()">‹</button>
        <span id="month-label">—</span>
        <button class="btn btn-nav" onclick="nextMonth()">›</button>
      </div>
    </div>
    <div class="header-right">
      <button class="btn btn-secondary btn-sm" onclick="openDevsModal()">👥 Gerenciar Devs</button>
      <button class="btn btn-primary btn-sm" onclick="openModal()">+ Nova Tarefa</button>
      <button class="btn btn-secondary btn-sm" onclick="saveToGitHub()">💾 Salvar</button>
      <button class="btn btn-ghost btn-sm" onclick="doLogout()">Sair</button>
    </div>
  </header>

  <div class="indicator-bar" id="indicator-bar"></div>

  <div class="filter-bar">
    <label>Tema</label>
    <select id="f-tema" onchange="applyFilters()"></select>
    <div class="filter-divider"></div>
    <label>Dev</label>
    <select id="f-dev" onchange="applyFilters()"></select>
    <div class="filter-divider"></div>
    <label>Prioridade</label>
    <select id="f-prio" onchange="applyFilters()">
      <option value="">Todas</option>
      <option value="alta">Alta</option>
      <option value="media">Média</option>
      <option value="baixa">Baixa</option>
    </select>
    <div class="filter-divider"></div>
    <label>Sprint</label>
    <input type="text" id="f-sprint" placeholder="ex: S1" oninput="applyFilters()" style="max-width:80px" />
    <div class="filter-divider"></div>
    <label>Status</label>
    <select id="f-status" onchange="applyFilters()">
      <option value="">Todos</option>
      <option value="backlog">Backlog</option>
      <option value="planejado">Planejado</option>
      <option value="em_andamento">Em andamento</option>
      <option value="concluido">Concluído</option>
      <option value="atrasado">Atrasado</option>
    </select>
  </div>

  <div class="main-layout">
    <div class="backlog-sidebar">
      <div class="backlog-header">
        <span>Backlog</span>
        <span id="backlog-count" style="font-size:11px;background:var(--bg4);padding:2px 7px;border-radius:10px;">0</span>
      </div>
      <div class="backlog-list" id="backlog-list"></div>
    </div>
    <div class="gantt-area" id="gantt-area">
      <div class="gantt-table" id="gantt-table"></div>
    </div>
  </div>
</div>

<!-- MODAL CREATE/EDIT -->
<div id="modal-main" class="modal-overlay" style="display:none" onclick="closeIfOverlay(event,'modal-main')">
  <div class="modal">
    <h2 id="modal-main-title">Nova Tarefa</h2>
    <input type="hidden" id="e-id" />
    <div class="form-row">
      <div class="form-group">
        <label>Título *</label>
        <input type="text" id="e-titulo" placeholder="Nome da tarefa" />
      </div>
      <div class="form-group">
        <label>Tema *</label>
        <select id="e-tema"></select>
      </div>
    </div>
    <div class="form-group">
      <label>Descrição</label>
      <textarea id="e-descricao" rows="2" placeholder="Detalhes da melhoria…"></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Responsável</label>
        <select id="e-dev"></select>
      </div>
      <div class="form-group">
        <label>Prioridade</label>
        <select id="e-prio">
          <option value="">—</option>
          <option value="alta">Alta</option>
          <option value="media">Média</option>
          <option value="baixa">Baixa</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Sprint</label>
        <input type="text" id="e-sprint" placeholder="ex: S1" />
      </div>
      <div class="form-group">
        <label>Status Planejamento</label>
        <select id="e-status-plan">
          <option value="backlog">Backlog</option>
          <option value="planejado">Planejado</option>
          <option value="em_andamento">Em andamento</option>
          <option value="concluido">Concluído</option>
          <option value="atrasado">Atrasado</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Data início</label>
        <input type="date" id="e-inicio" />
      </div>
      <div class="form-group">
        <label>Data fim</label>
        <input type="date" id="e-fim" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Estimativa (horas)</label>
        <input type="number" id="e-horas" placeholder="8" min="0" />
      </div>
      <div class="form-group">
        <label>Horas realizadas</label>
        <input type="number" id="e-horas-real" placeholder="0" min="0" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Solicitante</label>
        <input type="text" id="e-solicitante" placeholder="Nome ou área" />
      </div>
      <div class="form-group">
        <label>Data solicitação</label>
        <input type="date" id="e-data-solic" />
      </div>
    </div>
    <div class="form-group">
      <label>Observação</label>
      <textarea id="e-obs" rows="2" placeholder="Notas internas…"></textarea>
    </div>
    <div class="form-actions-left">
      <div style="display:flex;gap:8px">
        <button class="btn btn-secondary" onclick="closeModal('modal-main')">Cancelar</button>
        <button id="delete-btn" class="btn delete-btn" onclick="deleteCurrent()" style="display:none">Excluir</button>
      </div>
      <button class="btn btn-primary" onclick="saveTask()">Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL DEVS -->
<div id="modal-devs" class="modal-overlay" style="display:none" onclick="closeIfOverlay(event,'modal-devs')">
  <div class="modal" style="max-width:380px">
    <h2>Gerenciar Devs</h2>
    <div id="devs-list" style="margin-bottom:14px"></div>
    <div style="display:flex;gap:8px">
      <input type="text" id="new-dev-name" placeholder="Nome do dev" style="flex:1;padding:9px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:'Inter',sans-serif;outline:none;font-size:14px" onkeydown="if(event.key==='Enter')addDev()" />
      <button class="btn btn-primary" onclick="addDev()">Adicionar</button>
    </div>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="closeModal('modal-devs')">Fechar</button>
    </div>
  </div>
</div>

<div id="tooltip"></div>
<div id="toast"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────
const SENHA        = window.ADMIN_SENHA  || 'AudaxCapital123';
const GITHUB_TOKEN = window.GITHUB_TOKEN || '';
const GITHUB_USER  = 'CapFernando';
const GITHUB_REPO  = 'RoadMap';
const DATA_PATH    = 'data/melhorias.json';
const API_URL      = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${DATA_PATH}`;

// ── STATE ─────────────────────────────────────────────────────────────────
let state    = { temas: [], melhorias: [], desenvolvedores: [], feriados: [] };
let fileSha  = null;
let viewYear, viewMonth; // 0-indexed month

let filters  = { tema: '', dev: '', prio: '', sprint: '', status: '', indicator: '' };

// ── HOLIDAYS ──────────────────────────────────────────────────────────────
const NATIONAL_HOLIDAYS = new Set([
  '2025-01-01','2025-04-03','2025-04-21','2025-05-01','2025-06-19',
  '2025-09-07','2025-10-12','2025-11-02','2025-11-15','2025-11-20','2025-12-25',
  '2026-01-01','2026-04-03','2026-04-21','2026-05-01','2026-06-04',
  '2026-09-07','2026-10-12','2026-11-02','2026-11-15','2026-11-20','2026-12-25',
  '2027-01-01','2027-03-19','2027-04-02','2027-04-21','2027-05-01',
  '2027-05-27','2027-06-03','2027-09-07','2027-10-12','2027-11-02',
  '2027-11-15','2027-11-20','2027-12-25',
]);

function isHoliday(dateStr) {
  if (NATIONAL_HOLIDAYS.has(dateStr)) return true;
  if (state.feriados && state.feriados.includes(dateStr)) return true;
  return false;
}

function isWeekend(d) { const w = d.getDay(); return w === 0 || w === 6; }

function toDateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getWorkingDaysOfMonth(year, month) {
  const days = [];
  const daysInMonth = new Date(year, month+1, 0).getDate();
  for (let day = 1; day <= daysInMonth; day++) {
    const d = new Date(year, month, day);
    if (!isWeekend(d)) {
      const s = toDateStr(d);
      days.push({ date: d, str: s, holiday: isHoliday(s) });
    }
  }
  return days;
}

// ── LOGIN ─────────────────────────────────────────────────────────────────
let runtimeToken = GITHUB_TOKEN || localStorage.getItem('rm_token') || '';

function initLoginScreen() {
  if (!runtimeToken) document.getElementById('token-field').style.display = 'block';
}
function doLogin() {
  const v = document.getElementById('senha-input').value;
  if (!runtimeToken) {
    const t = document.getElementById('token-input').value.trim();
    if (!t) { document.getElementById('login-error').textContent = 'Informe o GitHub Token.'; return; }
    runtimeToken = t;
    localStorage.setItem('rm_token', t);
  }
  if (v === SENHA) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('gantt-app').style.display = 'block';
    const now = new Date();
    viewYear = now.getFullYear();
    viewMonth = now.getMonth();
    loadFromGitHub();
  } else {
    document.getElementById('login-error').textContent = 'Senha incorreta.';
    document.getElementById('senha-input').value = '';
  }
}
function doLogout() {
  if (!GITHUB_TOKEN) { runtimeToken = ''; }
  document.getElementById('gantt-app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('senha-input').value = '';
  document.getElementById('login-error').textContent = '';
}
initLoginScreen();

// ── GITHUB ────────────────────────────────────────────────────────────────
async function loadFromGitHub() {
  try {
    const res = await fetch(API_URL, {
      headers: { Authorization: `token ${runtimeToken}`, Accept: 'application/vnd.github.v3+json' }
    });
    if (res.status === 404) { renderAll(); return; }
    if (!res.ok) throw new Error('Erro ao carregar dados do GitHub.');
    const json = await res.json();
    fileSha = json.sha;
    const decoded = JSON.parse(decodeURIComponent(escape(atob(json.content.replace(/\n/g,'')))));
    state = {
      temas:         decoded.temas         || [],
      melhorias:     decoded.melhorias      || [],
      desenvolvedores: decoded.desenvolvedores || [],
      feriados:      decoded.feriados       || [],
    };
    // derive devs from melhoria.dev if missing
    if (!state.desenvolvedores.length) {
      const devSet = new Set(state.melhorias.map(m => m.dev).filter(Boolean));
      state.desenvolvedores = [...devSet];
    }
    renderAll();
  } catch(e) {
    toast(e.message, 'err');
    renderAll();
  }
}

async function saveToGitHub() {
  showSaving(true);
  try {
    state.atualizado_em = new Date().toISOString();
    const bytes = new TextEncoder().encode(JSON.stringify(state, null, 2));
    const content = btoa(String.fromCharCode(...bytes));
    const body = {
      message: `chore: planejamento ${new Date().toLocaleString('pt-BR')}`,
      content,
      ...(fileSha ? { sha: fileSha } : {})
    };
    const res = await fetch(API_URL, {
      method: 'PUT',
      headers: {
        Authorization: `token ${runtimeToken}`,
        Accept: 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });
    if (!res.ok) { const e = await res.json(); throw new Error(e.message || 'Erro ao salvar.'); }
    const data = await res.json();
    fileSha = data.content.sha;
    toast('Salvo com sucesso!', 'ok');
  } catch(e) {
    toast('Erro: ' + e.message, 'err');
  } finally {
    showSaving(false);
  }
}

// ── MONTH NAV ─────────────────────────────────────────────────────────────
function prevMonth() { viewMonth--; if (viewMonth < 0) { viewMonth = 11; viewYear--; } renderGantt(); }
function nextMonth() { viewMonth++; if (viewMonth > 11) { viewMonth = 0; viewYear++; } renderGantt(); }

const MONTH_NAMES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
                     'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DAY_ABBR    = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

// ── FILTERS ───────────────────────────────────────────────────────────────
function applyFilters() {
  filters.tema     = document.getElementById('f-tema').value;
  filters.dev      = document.getElementById('f-dev').value;
  filters.prio     = document.getElementById('f-prio').value;
  filters.sprint   = document.getElementById('f-sprint').value.trim().toLowerCase();
  filters.status   = document.getElementById('f-status').value;
  renderGantt();
}

function matchesFilters(m) {
  if (m.oculto) return false;
  if (filters.tema   && m.tema_id !== filters.tema)                 return false;
  if (filters.dev    && (m.dev||'') !== filters.dev)                return false;
  if (filters.prio   && (m.prioridade||'') !== filters.prio)        return false;
  if (filters.sprint && !(m.sprint||'').toLowerCase().includes(filters.sprint)) return false;
  if (filters.status && (m.status_planejamento||'backlog') !== filters.status) return false;
  if (filters.indicator && (m.status_planejamento||'backlog') !== filters.indicator) return false;
  return true;
}

// ── RENDER ALL ────────────────────────────────────────────────────────────
function renderAll() {
  renderFilters();
  renderIndicators();
  renderBacklog();
  renderGantt();
}

function renderFilters() {
  // tema
  const ft = document.getElementById('f-tema');
  const fv = ft ? ft.value : '';
  ft.innerHTML = `<option value="">Todos temas</option>` +
    state.temas.map(t => `<option value="${t.id}" ${fv===t.id?'selected':''}>${t.nome}</option>`).join('');

  // dev
  const fd = document.getElementById('f-dev');
  const dv = fd ? fd.value : '';
  fd.innerHTML = `<option value="">Todos devs</option>` +
    state.desenvolvedores.map(d => `<option value="${d}" ${dv===d?'selected':''}>${d}</option>`).join('');
}

// ── INDICATORS ────────────────────────────────────────────────────────────
function renderIndicators() {
  const visible = state.melhorias.filter(m => !m.oculto);
  const counts = { backlog:0, planejado:0, em_andamento:0, concluido:0, atrasado:0 };
  visible.forEach(m => {
    const sp = m.status_planejamento || 'backlog';
    if (counts[sp] !== undefined) counts[sp]++;
  });
  const labels = { backlog:'Backlog', planejado:'Planejado', em_andamento:'Em andamento', concluido:'Concluído', atrasado:'Atrasado' };
  document.getElementById('indicator-bar').innerHTML = Object.keys(counts).map(k => {
    const active = filters.indicator === k ? 'active-filter' : '';
    return `<span class="ind-chip ${k} ${active}" onclick="toggleIndicatorFilter('${k}')">${labels[k]} <strong>${counts[k]}</strong></span>`;
  }).join('');
}

function toggleIndicatorFilter(k) {
  filters.indicator = filters.indicator === k ? '' : k;
  renderIndicators();
  renderGantt();
  renderBacklog();
}

// ── BACKLOG ───────────────────────────────────────────────────────────────
function renderBacklog() {
  const el = document.getElementById('backlog-list');
  const list = state.melhorias.filter(m => {
    if (m.oculto) return false;
    const sp = m.status_planejamento || 'backlog';
    const noDate = (!m.inicio && !m.entrega);
    const isBacklog = sp === 'backlog';
    if (!noDate && !isBacklog) return false;
    if (!matchesFilters(m)) return false;
    return true;
  });
  document.getElementById('backlog-count').textContent = list.length;
  if (!list.length) { el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text3);font-size:12px">Nenhum item no backlog</div>'; return; }

  el.innerHTML = list.map(m => {
    const tema = state.temas.find(t => t.id === m.tema_id);
    const temaColor = temaColorOf(m.tema_id);
    const dotCls = prioClass(m.prioridade);
    return `<div class="backlog-card"
      draggable="true"
      data-id="${m.id}"
      ondragstart="onBacklogDragStart(event,'${m.id}')"
      onclick="openModal('${m.id}')">
      <div class="backlog-card-title">${esc(m.titulo)}</div>
      <div class="backlog-card-meta">
        ${tema ? `<span style="font-size:10px;padding:1px 5px;border-radius:4px;background:${temaColor}22;color:${temaColor};font-weight:600">${esc(tema.nome)}</span>` : ''}
        ${m.prioridade ? `<span class="card-dot ${dotCls}" style="width:6px;height:6px;border-radius:50%;display:inline-block;margin-left:2px"></span>` : ''}
      </div>
    </div>`;
  }).join('');
}

// ── GANTT ─────────────────────────────────────────────────────────────────
function renderGantt() {
  document.getElementById('month-label').textContent = `${MONTH_NAMES[viewMonth]} ${viewYear}`;

  const workDays = getWorkingDaysOfMonth(viewYear, viewMonth);
  const todayStr = toDateStr(new Date());

  const devs = state.desenvolvedores.length ? state.desenvolvedores : ['(sem dev)'];
  const table = document.getElementById('gantt-table');

  if (!devs.length) {
    table.innerHTML = '<div class="empty-gantt"><p>Nenhum desenvolvedor cadastrado.</p><button class="btn btn-primary" onclick="openDevsModal()">Adicionar devs</button></div>';
    return;
  }

  // filter melhorias
  const visible = state.melhorias.filter(m => !m.oculto && matchesFilters(m));

  // build HTML
  let html = '';

  // Header row
  html += `<div class="gantt-header-row">`;
  html += `<div class="gantt-corner">Dev / Capacidade</div>`;
  workDays.forEach(({ str, date, holiday }) => {
    const isToday = str === todayStr;
    const cls = [holiday ? 'holiday' : '', isToday ? 'today' : ''].filter(Boolean).join(' ');
    html += `<div class="day-cell-header ${cls}" data-date="${str}">
      <span class="day-num">${date.getDate()}</span>
      <span class="day-name">${DAY_ABBR[date.getDay()]}</span>
    </div>`;
  });
  html += `</div>`;

  // Dev rows
  devs.forEach(dev => {
    const devCards = visible.filter(m => (m.dev || '') === dev && (m.inicio || m.entrega));

    // capacity
    const totalWD = workDays.filter(d => !d.holiday).length;
    const occupiedDays = new Set();
    devCards.forEach(m => {
      if (!m.inicio) return;
      let cur = new Date(m.inicio + 'T12:00:00');
      const end = new Date((m.entrega || m.inicio) + 'T12:00:00');
      while (cur <= end) {
        const s = toDateStr(cur);
        if (!isWeekend(cur) && !isHoliday(s)) occupiedDays.add(s);
        cur.setDate(cur.getDate() + 1);
      }
    });
    const occ = occupiedDays.size;
    const pct = totalWD > 0 ? Math.min(Math.round(occ / totalWD * 100), 999) : 0;
    const over = occ > totalWD;
    const free = Math.max(0, totalWD - occ);

    // track assignment (greedy lane packing)
    const sorted = [...devCards].sort((a,b) => (a.inicio||'').localeCompare(b.inicio||''));
    const tracks = []; // each track = [{start,end}]
    const cardTrack = new Map();
    sorted.forEach(m => {
      const si = workDays.findIndex(d => d.str === m.inicio);
      const ei = workDays.findIndex(d => d.str === (m.entrega || m.inicio));
      const sIdx = si >= 0 ? si : (m.inicio < workDays[0]?.str ? -1 : workDays.length);
      const eIdx = ei >= 0 ? ei : (m.entrega > workDays[workDays.length-1]?.str ? workDays.length : -1);
      let placed = false;
      for (let t = 0; t < tracks.length; t++) {
        const last = tracks[t][tracks[t].length-1];
        if (sIdx > last.end) {
          tracks[t].push({ start: sIdx, end: eIdx, id: m.id });
          cardTrack.set(m.id, t);
          placed = true; break;
        }
      }
      if (!placed) {
        tracks.push([{ start: sIdx, end: eIdx, id: m.id }]);
        cardTrack.set(m.id, tracks.length-1);
      }
    });

    const numTracks = Math.max(1, tracks.length);
    const rowH = numTracks * 40 + 16;

    html += `<div class="dev-row" style="min-height:${rowH}px" data-dev="${esc(dev)}">`;

    // Label
    html += `<div class="dev-label">
      <div class="dev-name">${esc(dev)}</div>
      <div class="cap-bar-wrap">
        <div class="cap-bar-track"><div class="cap-bar-fill ${over?'over':''}" style="width:${Math.min(pct,100)}%"></div></div>
        <span class="cap-text">${pct}%</span>
      </div>
      <span class="cap-text">${free} dia${free!==1?'s':''} livre${free!==1?'s':''} / ${totalWD}</span>
    </div>`;

    // Timeline cells
    html += `<div class="dev-timeline" style="position:relative;height:${rowH}px">`;
    workDays.forEach(({ str, holiday }, idx) => {
      const isToday = str === todayStr;
      const cls = [holiday ? 'holiday' : '', isToday ? 'today-col' : ''].filter(Boolean).join(' ');
      html += `<div class="day-cell ${cls}"
        data-dev="${esc(dev)}" data-date="${str}" data-holiday="${holiday}"
        ondragover="onDayDragOver(event)"
        ondragleave="onDayDragLeave(event)"
        ondrop="onDayDrop(event)"
        onclick="onDayCellClick(event,'${esc(dev)}','${str}')">
      </div>`;
    });

    // Cards layer
    html += `<div class="gantt-cards-layer" id="cards-layer-${CSS.escape(dev)}">`;
    devCards.forEach(m => {
      const sp = m.status_planejamento || 'backlog';
      const tema = state.temas.find(t => t.id === m.tema_id);
      const tColor = temaColorOf(m.tema_id);
      const dotCls = prioClass(m.prioridade);
      const trackIdx = cardTrack.get(m.id) ?? 0;
      const top = trackIdx * 40 + 8;

      let sIdx = workDays.findIndex(d => d.str === m.inicio);
      let eIdx = workDays.findIndex(d => d.str === (m.entrega || m.inicio));
      // clip
      if (sIdx < 0 && m.inicio < (workDays[0]?.str || '')) sIdx = 0;
      if (eIdx < 0 && (m.entrega || m.inicio) > (workDays[workDays.length-1]?.str || '')) eIdx = workDays.length - 1;
      if (sIdx < 0 || eIdx < 0 || eIdx < sIdx) return; // outside month

      const left = sIdx * 52;
      const width = (eIdx - sIdx + 1) * 52 - 4;

      html += `<div class="gantt-card gcard-${sp}"
        style="left:${left}px;top:${top}px;width:${width}px;height:32px"
        data-id="${m.id}"
        draggable="true"
        ondragstart="onCardDragStart(event,'${m.id}')"
        onclick="openModal('${m.id}')"
        onmouseenter="showTooltip(event,'${m.id}')"
        onmouseleave="hideTooltip()">
        ${m.prioridade ? `<span class="card-dot ${dotCls}"></span>` : ''}
        <span class="card-label">${esc(m.titulo)}</span>
        ${tema ? `<span class="tema-badge" style="background:${tColor}22;color:${tColor}">${esc(tema.nome)}</span>` : ''}
      </div>`;
    });
    html += `</div>`; // cards-layer
    html += `</div>`; // dev-timeline
    html += `</div>`; // dev-row
  });

  table.innerHTML = html;
}

// ── TOOLTIP ───────────────────────────────────────────────────────────────
function showTooltip(e, id) {
  const m = state.melhorias.find(x => x.id === id);
  if (!m) return;
  const tema = state.temas.find(t => t.id === m.tema_id);
  const tt = document.getElementById('tooltip');
  tt.innerHTML = `
    <div class="tt-title">${esc(m.titulo)}</div>
    ${m.descricao ? `<div class="tt-row">${esc(m.descricao.substring(0,120))}</div>` : ''}
    ${tema ? `<div class="tt-row"><b>Tema:</b> ${esc(tema.nome)}</div>` : ''}
    ${m.dev ? `<div class="tt-row"><b>Dev:</b> ${esc(m.dev)}</div>` : ''}
    ${m.solicitante ? `<div class="tt-row"><b>Solicitante:</b> ${esc(m.solicitante)}</div>` : ''}
    ${m.inicio ? `<div class="tt-row"><b>Período:</b> ${fmtDate(m.inicio)} → ${fmtDate(m.entrega||m.inicio)}</div>` : ''}
    ${m.estimativa_horas ? `<div class="tt-row"><b>Estimativa:</b> ${m.estimativa_horas}h</div>` : ''}
    ${m.sprint ? `<div class="tt-row"><b>Sprint:</b> ${esc(m.sprint)}</div>` : ''}
  `;
  positionTooltip(e, tt);
  tt.classList.add('show');
}
function hideTooltip() {
  document.getElementById('tooltip').classList.remove('show');
}
function positionTooltip(e, el) {
  const margin = 10;
  const w = 300, h = 180;
  let x = e.clientX + margin;
  let y = e.clientY + margin;
  if (x + w > window.innerWidth)  x = e.clientX - w - margin;
  if (y + h > window.innerHeight) y = e.clientY - h - margin;
  el.style.left = x + 'px';
  el.style.top  = y + 'px';
}

// ── DRAG & DROP ───────────────────────────────────────────────────────────
let dragData = { type: null, id: null }; // type: 'card' | 'backlog'

function onCardDragStart(e, id) {
  dragData = { type: 'card', id };
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => {
    const el = document.querySelector(`.gantt-card[data-id="${id}"]`);
    if (el) el.classList.add('dragging');
  }, 0);
}

function onBacklogDragStart(e, id) {
  dragData = { type: 'backlog', id };
  e.dataTransfer.effectAllowed = 'move';
}

function onDayDragOver(e) {
  const cell = e.currentTarget;
  if (cell.dataset.holiday === 'true') return;
  e.preventDefault();
  cell.classList.add('drop-over');
}

function onDayDragLeave(e) {
  e.currentTarget.classList.remove('drop-over');
}

function onDayDrop(e) {
  e.preventDefault();
  const cell = e.currentTarget;
  cell.classList.remove('drop-over');
  if (cell.dataset.holiday === 'true') { toast('Não é possível alocar em feriados.', 'err'); return; }

  const targetDev  = cell.dataset.dev;
  const targetDate = cell.dataset.date;

  if (!dragData.id) return;
  const m = state.melhorias.find(x => x.id === dragData.id);
  if (!m) return;

  document.querySelectorAll('.gantt-card.dragging').forEach(el => el.classList.remove('dragging'));

  if (dragData.type === 'backlog') {
    m.dev = targetDev;
    m.inicio = targetDate;
    m.entrega = targetDate;
    m.status_planejamento = m.status_planejamento === 'backlog' ? 'planejado' : m.status_planejamento;
    m.status = spToStatus(m.status_planejamento);
  } else if (dragData.type === 'card') {
    // preserve duration
    if (m.inicio && m.entrega) {
      const dur = Math.round((new Date(m.entrega+'T12:00:00') - new Date(m.inicio+'T12:00:00')) / 86400000);
      const newStart = new Date(targetDate+'T12:00:00');
      const newEnd   = new Date(targetDate+'T12:00:00');
      newEnd.setDate(newEnd.getDate() + dur);
      m.inicio  = targetDate;
      m.entrega = toDateStr(newEnd);
    } else {
      m.inicio  = targetDate;
      m.entrega = targetDate;
    }
    m.dev = targetDev;
  }

  dragData = { type: null, id: null };
  renderAll();
  saveToGitHub();
}

function onDayCellClick(e, dev, date) {
  // Only open if clicking empty space (not a card)
  if (e.target.classList.contains('gantt-card') || e.target.closest('.gantt-card')) return;
  if (e.currentTarget.dataset.holiday === 'true') return;
  openModal(null, dev, date);
}

// ── MODAL ─────────────────────────────────────────────────────────────────
let editingId = null;

function openModal(id, prefillDev, prefillDate) {
  editingId = id || null;
  const m = id ? state.melhorias.find(x => x.id === id) : null;
  document.getElementById('modal-main-title').textContent = m ? 'Editar Tarefa' : 'Nova Tarefa';
  document.getElementById('delete-btn').style.display = m ? 'inline-flex' : 'none';

  // fill tema select
  const es = document.getElementById('e-tema');
  es.innerHTML = state.temas.length
    ? state.temas.map(t => `<option value="${t.id}" ${m?.tema_id===t.id?'selected':''}>${esc(t.nome)}</option>`).join('')
    : '<option value="">— Cadastre um tema no Admin —</option>';

  // fill dev select
  const ed = document.getElementById('e-dev');
  const devToSelect = m?.dev || prefillDev || '';
  ed.innerHTML = `<option value="">—</option>` +
    state.desenvolvedores.map(d => `<option value="${d}" ${devToSelect===d?'selected':''}>${esc(d)}</option>`).join('');

  document.getElementById('e-id').value        = m?.id || '';
  document.getElementById('e-titulo').value    = m?.titulo || '';
  document.getElementById('e-descricao').value = m?.descricao || '';
  document.getElementById('e-prio').value      = m?.prioridade || '';
  document.getElementById('e-sprint').value    = m?.sprint || '';
  document.getElementById('e-status-plan').value = m?.status_planejamento || 'backlog';
  document.getElementById('e-inicio').value    = m?.inicio || prefillDate || '';
  document.getElementById('e-fim').value       = m?.entrega || prefillDate || '';
  document.getElementById('e-horas').value     = m?.estimativa_horas || '';
  document.getElementById('e-horas-real').value= m?.horas_realizadas || '';
  document.getElementById('e-solicitante').value = m?.solicitante || '';
  document.getElementById('e-data-solic').value  = m?.data_solicitacao || '';
  document.getElementById('e-obs').value       = m?.observacao || '';

  document.getElementById('modal-main').style.display = 'flex';
  setTimeout(() => document.getElementById('e-titulo').focus(), 50);
}

function saveTask() {
  const titulo = document.getElementById('e-titulo').value.trim();
  const temaId = document.getElementById('e-tema').value;
  if (!titulo) { toast('Informe o título.', 'err'); return; }

  const inicio = document.getElementById('e-inicio').value;
  const fim    = document.getElementById('e-fim').value;
  if (inicio && fim && fim < inicio) { toast('Data fim deve ser >= data início.', 'err'); return; }

  const sp = document.getElementById('e-status-plan').value;

  const obj = {
    id:                 editingId || uid(),
    titulo,
    descricao:          document.getElementById('e-descricao').value.trim(),
    tema_id:            temaId,
    status:             spToStatus(sp),
    estimativa:         '',
    dev:                document.getElementById('e-dev').value,
    inicio:             inicio,
    entrega:            fim,
    motivo_negacao:     '',
    criado_em:          editingId ? (state.melhorias.find(x=>x.id===editingId)?.criado_em || new Date().toISOString()) : new Date().toISOString(),
    prioridade:         document.getElementById('e-prio').value,
    solicitante:        document.getElementById('e-solicitante').value.trim(),
    data_solicitacao:   document.getElementById('e-data-solic').value,
    sprint:             document.getElementById('e-sprint').value.trim(),
    estimativa_horas:   parseFloat(document.getElementById('e-horas').value) || 0,
    horas_realizadas:   parseFloat(document.getElementById('e-horas-real').value) || 0,
    status_planejamento: sp,
    observacao:         document.getElementById('e-obs').value.trim(),
    oculto:             editingId ? (state.melhorias.find(x=>x.id===editingId)?.oculto || false) : false,
    ordem:              editingId ? (state.melhorias.find(x=>x.id===editingId)?.ordem ?? state.melhorias.length) : state.melhorias.length,
  };

  if (editingId) {
    const idx = state.melhorias.findIndex(x => x.id === editingId);
    if (idx >= 0) state.melhorias[idx] = obj; else state.melhorias.push(obj);
  } else {
    state.melhorias.push(obj);
  }

  closeModal('modal-main');
  renderAll();
  toast('Tarefa salva. Clique em Salvar para publicar.', 'ok');
}

function deleteCurrent() {
  if (!editingId) return;
  if (!confirm('Excluir esta tarefa?')) return;
  state.melhorias = state.melhorias.filter(m => m.id !== editingId);
  closeModal('modal-main');
  renderAll();
  toast('Tarefa removida.', 'ok');
}

// ── DEVS MODAL ────────────────────────────────────────────────────────────
function openDevsModal() {
  renderDevsList();
  document.getElementById('modal-devs').style.display = 'flex';
}

function renderDevsList() {
  const el = document.getElementById('devs-list');
  if (!state.desenvolvedores.length) {
    el.innerHTML = '<div style="color:var(--text3);font-size:13px;padding:8px 0">Nenhum dev cadastrado.</div>';
    return;
  }
  el.innerHTML = state.desenvolvedores.map((d,i) =>
    `<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:var(--bg3);border-radius:8px;margin-bottom:6px">
      <span style="font-size:14px;font-weight:500">${esc(d)}</span>
      <button class="btn btn-ghost btn-sm" onclick="removeDev(${i})" style="color:var(--red);border-color:var(--red)">Remover</button>
    </div>`
  ).join('');
}

function addDev() {
  const name = document.getElementById('new-dev-name').value.trim();
  if (!name) return;
  if (state.desenvolvedores.includes(name)) { toast('Dev já existe.', 'err'); return; }
  state.desenvolvedores.push(name);
  document.getElementById('new-dev-name').value = '';
  renderDevsList();
  renderFilters();
  renderGantt();
  toast('Dev adicionado.', 'ok');
}

function removeDev(i) {
  const name = state.desenvolvedores[i];
  if (!confirm(`Remover "${name}"?`)) return;
  state.desenvolvedores.splice(i, 1);
  renderDevsList();
  renderFilters();
  renderGantt();
  toast('Dev removido.', 'ok');
}

// ── HELPERS ───────────────────────────────────────────────────────────────
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

function fmtDate(s) {
  if (!s) return '—';
  const [y,m,d] = s.split('-');
  return `${d}/${m}/${y}`;
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function closeModal(id) { document.getElementById(id).style.display = 'none'; }
function closeIfOverlay(e, id) { if (e.target === e.currentTarget) closeModal(id); }

function spToStatus(sp) {
  const map = { backlog:'recebida', planejado:'estimada', em_andamento:'iniciada', concluido:'iniciada', atrasado:'iniciada' };
  return map[sp] || 'recebida';
}

function prioClass(p) {
  if (p === 'alta')  return 'dot-alta';
  if (p === 'media') return 'dot-media';
  if (p === 'baixa') return 'dot-baixa';
  return '';
}

const TEMA_PALETTE = ['#3B8FE8','#9B6FE8','#2BBFA0','#E89C2F','#5EA832','#E84444','#E86A3B','#3BE8C4','#E8B43B','#8FE83B'];
function temaColorOf(temaId) {
  const idx = state.temas.findIndex(t => t.id === temaId);
  return TEMA_PALETTE[Math.max(0,idx) % TEMA_PALETTE.length];
}

let toastTimer;
function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 3500);
}

function showSaving(on) {
  const id = 'saving-overlay';
  if (on) {
    if (document.getElementById(id)) return;
    const d = document.createElement('div');
    d.id = id; d.className = 'saving-overlay';
    d.textContent = 'Publicando no GitHub…';
    document.body.appendChild(d);
  } else {
    document.getElementById(id)?.remove();
  }
}
</script>
</body>
